name: Update Google review count

# Runs once per day at 04:15 UTC (≈ 05:15/06:15 Belgrade time) and can also
# be triggered manually from the Actions tab via "Run workflow".
on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: write  # needed to commit reviews.json back to main

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch current review count from SerpAPI
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/update-review-count.mjs

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain public/reviews.json)" ]; then
            echo "No changes to reviews.json — nothing to commit."
            exit 0
          fi
          git config user.name  "predator-review-bot"
          git config user.email "noreply@github.com"
          git add public/reviews.json
          git commit -m "chore(reviews): auto-update Google review count ($(date -u +%Y-%m-%d))"
          git push
